<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Charles Mwaura | CV</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #0f1115;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    .header {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 0 16px;
      background: #171a21;
      box-sizing: border-box;
      font-size: 18px;
      font-weight: 700;
    }

    .header a {
      color: #d7d7d7;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      border: 1px solid #3a3f4b;
      padding: 6px 10px;
      border-radius: 8px;
    }

    .header a:hover {
      background: #222734;
    }

    .viewer {
      width: 100%;
      height: calc(100vh - 56px);
      border: none;
      display: block;
    }

    .fallback {
      display: none;
      padding: 40px 20px;
      text-align: center;
      color: #c7c7c7;
    }

    .fallback a {
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="header">
    <span>Charles Mwaura — CV</span>
    <a href="/Charles_Mwaura_CV.pdf" target="_blank" rel="noopener noreferrer">Open PDF</a>
  </div>

  <iframe
    class="viewer"
    src="/Charles_Mwaura_CV.pdf#view=FitH"
    title="Charles Mwaura CV">
  </iframe>

  <div class="fallback" id="fallback">
    <p>Preview not available on this device.</p>
    <p><a href="/Charles_Mwaura_CV.pdf" target="_blank" rel="noopener noreferrer">Open the PDF directly</a></p>
  </div>

  <script>
    setTimeout(() => {
      const iframe = document.querySelector(".viewer");
      try {
        if (!iframe || iframe.contentWindow?.location?.href === "about:blank") {
          document.getElementById("fallback").style.display = "block";
        }
      } catch (e) {
        // Cross-origin/frame restrictions can happen; keep silent.
      }
    }, 2000);
  </script>
</body>
</html>
